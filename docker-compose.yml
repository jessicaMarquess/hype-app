version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hype-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     hype
      POSTGRES_PASSWORD: hype
      POSTGRES_DB:       hype
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hype']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hype-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run full stack in Docker (optional for dev)
